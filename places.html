<!DOCTYPE html>
<html>
<head>
<title>Places</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f2f2f2;
}

h2 {
    text-align: center;
    padding: 20px;
}

.places {
    display: grid;
    grid-template-columns: repeat(3, 1fr); /* 3 per row */
    gap: 20px;
    padding: 30px;
}

.card {
    background: rgb(74, 238, 224);
    border-radius: 10px;
    box-shadow: 0 4px 8px gray;
    text-align: center;
    overflow: hidden;
}

.card img {
    width: 100%;
}

button {
    padding: 12px 40px;
    margin: 10px;
    background: rgb(111, 184, 226);
    border: none;
    cursor: pointer;
}

button:hover {
    background: rgb(6, 24, 129);
    color: rgb(67, 203, 236);
}
</style>

</head>

<body>
