<!DOCTYPE html>
<html>
<head>
<title>Success</title>

<style>

    margin: 0;
    font-family: Arial;


    background: url("367e5458-6d2b-4f60-9b5f-27b4540615e4.tmp") no-repeat center/cover;
    height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;
}

.box {
    background: rgba(255, 255, 255, 0.95);
    padding: 40px;

h1 {
    color: green;
    margin-bottom: 10px;
}

p {
    font-size: 18px;
}

a button {
    margin-top: 20px;
    padding: 10px 20px;
    background: black;
    color: white;
    border: none;
    cursor: pointer;
    border-radius: 5px;
}+

a button:hover {
    background: rgb(67, 203, 236);
}
</style>

</head>

<body>

<div class="box">
    <h1>Thanks for booking!</h1>
    <p>Enjoy your journey ✈️</p>

    <a href="index.html">

</html>
